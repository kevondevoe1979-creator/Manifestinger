function playPreset(id, dur=8) {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const master = ctx.createGain();
  master.gain.setValueAtTime(0.0001, ctx.currentTime);
  master.gain.linearRampToValueAtTime(0.4, ctx.currentTime+0.3);
  master.connect(ctx.destination);

  if (id==="bowl") {
    [220,440,660].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="sine"; o.frequency.value=f;
      g.gain.setValueAtTime(0.3-i*0.08,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+dur);
    });
  } else if (id==="rain") {
    const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*0.5;
    const src=ctx.createBufferSource();
    const filt=ctx.createBiquadFilter();
    filt.type="highpass"; filt.frequency.value=2000;
    src.buffer=buf; src.connect(filt); filt.connect(master); src.start();
    for(let i=0;i<dur*6;i++){
      setTimeout(()=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type="sine"; o.frequency.value=1800+Math.random()*1200;
        g.gain.setValueAtTime(0.08,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
        o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+0.15);
      }, Math.random()*dur*1000);
    }
  } else if (id==="wind") {
    const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1);
    const src=ctx.createBufferSource();
    const filt=ctx.createBiquadFilter();
    filt.type="bandpass"; filt.frequency.value=400; filt.Q.value=0.7;
    src.buffer=buf; src.connect(filt); filt.connect(master); src.start();
  } else if (id==="fire") {
    const buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1);
    const src=ctx.createBufferSource();
    const filt=ctx.createBiquadFilter();
    filt.type="lowpass"; filt.frequency.value=500;
    src.buffer=buf; src.connect(filt); filt.connect(master); src.start();
    for(let i=0;i<dur*4;i++){
      setTimeout(()=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type="square"; o.frequency.value=100+Math.random()*300;
        g.gain.setValueAtTime(0.15,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);
        o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+0.05);
      }, Math.random()*dur*1000);
    }
  } else if (id==="cash") {
    const notes=[1046,1318,1568,2093];
    notes.forEach((f,i)=>{
      setTimeout(()=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type="square"; o.frequency.value=f;
        g.gain.setValueAtTime(0.2,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
        o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+0.3);
      }, i*90);
    });
  } else if (id==="coins") {
    for(let i=0;i<14;i++){
      setTimeout(()=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type="triangle"; o.frequency.value=1800+Math.random()*1400;
        g.gain.setValueAtTime(0.15,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
        o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+0.2);
      }, i*120+Math.random()*80);
    }
  } else if (id==="counter") {
    const clicks=Math.floor(dur*10);
    for(let i=0;i<clicks;i++){
      setTimeout(()=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type="square"; o.frequency.value=2000;
        g.gain.setValueAtTime(0.1,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.03);
        o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+0.03);
      }, i*100);
    }
  } else if (id==="trumpet") {
    const notes=[523,659,784,1046];
    notes.forEach((f,i)=>{
      setTimeout(()=>{
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.type="sawtooth"; o.frequency.value=f;
        g.gain.setValueAtTime(0.0001,ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
        o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+0.5);
      }, i*220);
    });
  } else if (id==="birds") {
    for(let i=0;i<8;i++) setTimeout(()=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      const f=800+Math.random()*600;
      o.type="sine"; o.frequency.value=f;
      o.frequency.linearRampToValueAtTime(f*1.3,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      o.connect(g); g.connect(master); o.start(); o.stop(ctx.currentTime+0.4);
    }, i*800+Math.random()*400);
  }
  master.gain.setValueAtTime(0.4,ctx.currentTime+dur-0.5);
  master.gain.linearRampToValueAtTime(0.0001,ctx.currentTime+dur);
  return ctx;
}

function blankAlarm() {
  return { id:Date.now(), label:"", time:"08:00", days:["MO","TU","WE","TH","FR"],
    active:true, showVision:true, visionId:null, playSound:false,
    anchorId:null, showAffirm:false, affirmIntention:null };
}

export default function ManiFestinger() {
  const [tab, setTab] = useState(0);

  // Affirmation
  const [intention, setIntention]         = useState(null);
  const [intentionOpen, setIntentionOpen] = useState(false);
  const [affirmation, setAffirmation]     = useState("");
  const [afLoading, setAfLoading]         = useState(false);
  const [afRevealed, setAfRevealed]       = useState(false);

  // Vision board
  const [visions, setVisions]   = useState([]);
  const [vLabel, setVLabel]     = useState("");
  const [vUrl, setVUrl]         = useState("");
  const [focusedV, setFocusedV] = useState(null);
  const fileRef = useRef(null);

  // Sound anchors
  const [anchors, setAnchors]         = useState([]);
  const [aName, setAName]             = useState("");
  const [aMemory, setAMemory]         = useState("");
  const [aPreset, setAPreset]         = useState(null);
  const [aUpload, setAUpload]         = useState(null);
  const [aUploadName, setAUploadName] = useState("");
  const [aRecorded, setARecorded]     = useState(null);
  const [recording, setRecording]     = useState(false);
  const [soundTab, setSoundTab]       = useState(0);
  const [playing, setPlaying]         = useState(null);
  const audioRef     = useRef(null);
  const mrRef        = useRef(null);
  const audioFileRef = useRef(null);

  // Alarms
  const [alarms, setAlarms]   = useState([]);
  const [editing, setEditing] = useState(null);
  const [firing, setFiring]   = useState(null);
  const [firingAf, setFiringAf] = useState("");
  const tickRef = useRef(null);

  // Grabovoi
  const [grabIntention, setGrabIntention]   = useState(null);
  const [grabOpen, setGrabOpen]             = useState(false);
  const [grabAffirm, setGrabAffirm]         = useState("");
  const [grabAfLoading, setGrabAfLoading]   = useState(false);
  const [customCodes, setCustomCodes]       = useState([]);
  const [newCodeName, setNewCodeName]       = useState("");
  const [newCodeNumber, setNewCodeNumber]   = useState("");
  const [newCodeDesc, setNewCodeDesc]       = useState("");
  const [showAddCode, setShowAddCode]       = useState(false);
  // Meditation mode
  const [medActive, setMedActive]           = useState(false);
  const [medFullscreen, setMedFullscreen]   = useState(false);
  const [medSound, setMedSound]             = useState("bowl");
  const [medMinutes, setMedMinutes]         = useState(5);
  const [medSecondsLeft, setMedSecondsLeft] = useState(null);
  const [medRunning, setMedRunning]         = useState(false);
  const [medPulse, setMedPulse]             = useState(false);
  const medTimerRef = useRef(null);
  const medCtxRef   = useRef(null);

  // Progress tracking
  const today = new Date().toISOString().split("T")[0];
  const [medDays, setMedDays]         = useState({}); // { "2026-06-01": true }
  const [afLog, setAfLog]             = useState([]); // saved affirmations
  const [goals, setGoals]             = useState([]);
  const [newGoalText, setNewGoalText] = useState("");
  const [newGoalTarget, setNewGoalTarget] = useState(10);
  const [showGoalForm, setShowGoalForm]   = useState(false);

  // Alarm tick
  useEffect(()=>{
    tickRef.current = setInterval(async ()=>{
      const now  = new Date();
      const hhmm = String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
      const day  = DAYS_LIST[now.getDay()];
      for (const alarm of alarms) {
        if (!alarm.active||alarm.time!==hhmm||!alarm.days.includes(day)) continue;
        fireAlarm(alarm);
      }
    }, 30000);
    return ()=>clearInterval(tickRef.current);
  }, [alarms, visions, anchors]);

  async function fireAlarm(alarm) {
    let vision = null;
    if (alarm.showVision&&visions.length>0) {
      vision = alarm.visionId ? visions.find(v=>v.id===alarm.visionId)||visions[0]
        : visions[Math.floor(Math.random()*visions.length)];
    }
    if (alarm.playSound&&anchors.length>0) {
      const anchor = alarm.anchorId ? anchors.find(a=>a.id===alarm.anchorId)
        : anchors[Math.floor(Math.random()*anchors.length)];
      if (anchor) playAnchor(anchor, true);
    }
    let afText = "";
    if (alarm.showAffirm&&alarm.affirmIntention) {
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300,
            system:"Generate ONE short powerful affirmation (1-2 sentences + ALL CAPS mantra). Respond ONLY with the affirmation.",
            messages:[{role:"user",content:`Affirmation for: ${alarm.affirmIntention}`}],
          }),
        });
        const data = await res.json();
        afText = data.content?.map(b=>b.text||"").join("").trim()||"";
      } catch { afText=""; }
    }
    setFiringAf(afText);
    setFiring({alarm, vision});
    setTimeout(()=>{ setFiring(null); setFiringAf(""); }, 12000);
  }

  async function generateAffirmation() {
    if (!intention||afLoading) return;
    setAfLoading(true); setAfRevealed(false); setAffirmation("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:"You are ManiFestinger's cosmic oracle. Generate ONE powerful personal affirmation: 2-4 sentences, present tense, poetic, end with short ALL CAPS mantra. Respond ONLY with the affirmation.",
          messages:[{role:"user",content:`Affirmation for: ${intention}`}],
        }),
      });
      const data = await res.json();
      const text = data.content?.map(b=>b.text||"").join("").trim()||"I am aligned with the universe. Everything flows to me.\n\nI RECEIVE.";
      setAffirmation(text);
      setAfLog(prev=>[{text, intention, date:today}, ...prev].slice(0,50));
    } catch { setAffirmation("I am aligned with the universe. Everything I desire flows to me effortlessly.\n\nI RECEIVE."); }
    finally { setAfLoading(false); setTimeout(()=>setAfRevealed(true),80); }
  }

  async function generateGrabAffirm(int) {
    if (!int) return;
    setGrabAfLoading(true); setGrabAffirm("");
    const code = GRABOVOI_CODES[int]?.code || "";
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400,
          system:`You are a Grabovoi code meditation guide. Generate a short powerful affirmation (2-3 sentences) that naturally weaves in the Grabovoi code numbers as a chant or mantra. The code should feel sacred, not random. End with the code itself on its own line. Respond ONLY with the affirmation text.`,
          messages:[{role:"user",content:`Intention: ${int}\nGrabovoi Code: ${code}`}],
        }),
      });
      const data = await res.json();
      setGrabAffirm(data.content?.map(b=>b.text||"").join("").trim()||`I align with the frequency of ${int}.\n\n${code}`);
    } catch { setGrabAffirm(`I align with the healing frequency of ${int}.\nI chant the sacred numbers and open to receive.\n\n${code}`); }
    finally { setGrabAfLoading(false); }
  }

  function startMeditation() {
    setMedActive(true);
    setMedSecondsLeft(medMinutes * 60);
    setMedRunning(true);
    setMedPulse(true);
    medCtxRef.current = playPreset(medSound, medMinutes * 60);
  }

  function stopMeditation() {
    clearInterval(medTimerRef.current);
    setMedDays(prev => ({...prev, [today]: true}));
    setMedRunning(false); setMedActive(false);
    setMedFullscreen(false); setMedSecondsLeft(null); setMedPulse(false);
    try { medCtxRef.current?.close(); } catch {}
  }

  useEffect(()=>{
    if (medRunning && medSecondsLeft > 0) {
      medTimerRef.current = setInterval(()=>{
        setMedSecondsLeft(s=>{
          if (s<=1) { stopMeditation(); return 0; }
          return s-1;
        });
      }, 1000);
    }
    return ()=>clearInterval(medTimerRef.current);
  }, [medRunning]);

  function fmtTime(s) {
    const m = Math.floor(s/60), sec = s%60;
    return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  }

  function handleVisionFile(e) {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      setVisions(p=>[...p,{id:Date.now(),src:ev.target.result,label:vLabel||"My Vision"}]);
      setVLabel("");
    };
    reader.readAsDataURL(file);
  }
  function addVisionUrl() {
    if(!vUrl.trim()) return;
    setVisions(p=>[...p,{id:Date.now(),src:vUrl.trim(),label:vLabel||"My Vision"}]);
    setVUrl(""); setVLabel("");
  }
  function handleAudioFile(e) {
    const file=e.target.files[0]; if(!file) return;
    setAUpload(URL.createObjectURL(file)); setAUploadName(file.name);
  }
  async function startRec() {
    try {
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream); const chunks=[];
      mr.ondataavailable=e=>chunks.push(e.data);
      mr.onstop=()=>{ setARecorded(URL.createObjectURL(new Blob(chunks,{type:"audio/webm"}))); stream.getTracks().forEach(t=>t.stop()); };
      mrRef.current=mr; mr.start(); setRecording(true);
    } catch { alert("Mic access needed."); }
  }
  function stopRec() { mrRef.current?.stop(); setRecording(false); }
  function addAnchor() {
    if(!aName.trim()) return;
    let sType=null,sSrc=null,sLabel="";
    if(soundTab===0&&aPreset){sType="preset";sSrc=aPreset.id;sLabel=aPreset.label;}
    else if(soundTab===1&&aUpload){sType="audio";sSrc=aUpload;sLabel=aUploadName;}
    else if(soundTab===2&&aRecorded){sType="audio";sSrc=aRecorded;sLabel="My Recording";}
    setAnchors(p=>[...p,{id:Date.now(),name:aName,memory:aMemory,sType,sSrc,sLabel}]);
    setAName(""); setAMemory(""); setAPreset(null); setAUpload(null); setAUploadName(""); setARecorded(null);
  }
  function playAnchor(a, silent=false) {
    if(!silent&&playing===a.id){ audioRef.current?.pause(); setPlaying(null); return; }
    if(!silent) setPlaying(a.id);
    if(a.sType==="preset"){ playPreset(a.sSrc); if(!silent) setTimeout(()=>setPlaying(null),5000); }
    else if(a.sType==="audio"){ const au=new Audio(a.sSrc); audioRef.current=au; au.play(); if(!silent) au.onended=()=>setPlaying(null); }
  }
  function openNewAlarm() { setEditing(blankAlarm()); }
  function saveAlarm() {
    if(!editing) return;
    setAlarms(p=>{ const ex=p.find(a=>a.id===editing.id); return ex?p.map(a=>a.id===editing.id?editing:a):[...p,editing]; });
    setEditing(null);
  }
  function updateEditing(key,val) { setEditing(e=>({...e,[key]:val})); }
  function toggleEditDay(d) { setEditing(e=>({...e,days:e.days.includes(d)?e.days.filter(x=>x!==d):[...e.days,d]})); }
  function previewAlarm() {
    if(!editing) return;
    if(editing.showVision&&visions.length===0){ alert("Add a vision photo first!"); return; }
    fireAlarm(editing);
  }

  const NAV=[
    {icon:"✦",  label:"Affirm",  iconStyle:{}, labelStyle:{color:"#ffd700"}},
    {icon:"👁",  label:"Vision",  iconStyle:{fontSize:18}, labelStyle:{color:"#ffd700"}},
    {icon:"🎵", label:"Sound",   iconStyle:{}, labelStyle:{color:"#ffd700"}},
    {icon:"Ⅻ",  label:"Alarms",  iconStyle:{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:"#ffd700",filter:"drop-shadow(0 0 6px rgba(255,200,0,0.6))"}, labelStyle:{color:"#ffd700"}},
    {icon:"#",  label:"Grabovoi",iconStyle:{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#ffd700",filter:"drop-shadow(0 0 6px rgba(255,200,0,0.6))"}, labelStyle:{color:"#ffd700"}},
    {icon:"👣",  label:"Progress", iconStyle:{fontSize:16}, labelStyle:{color:"#ffd700",filter:"drop-shadow(0 0 6px rgba(255,200,0,0.6))"}},
  ];
  const grabData = grabIntention ? (GRABOVOI_CODES[grabIntention] || customCodes.find(c=>c.name===grabIntention)) : null;

  return (

                </div>

                {/* Log today button */}
                <button style={{...S.genBtn, ...(medDays[today]?S.btnOff:{})}}
                  onClick={()=>setMedDays(prev=>({...prev,[today]:true}))}
                  disabled={!!medDays[today]}>
                  {medDays[today]?"✓ Meditation Logged Today":"✦ Log Today's Meditation"}
                </button>

                {/* 30-day calendar */}
                <div style={S.alarmBox}>
                  <p style={S.alarmBoxLabel}>LAST 30 DAYS</p>
                  <div style={S.calGrid}>
                    {last30.map(d=>(
                      <div key={d} title={d} style={{...S.calDay,...(medDays[d]?S.calDayOn:{})}}>
                        {medDays[d]?"✦":""}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Goals tracker */}
                <div style={S.alarmBox}>
                  <p style={S.alarmBoxLabel}>DREAM GOALS</p>
                  {goals.length===0&&!showGoalForm&&(
                    <p style={S.emptyTxt}>Set a goal and track your milestones.</p>
                  )}
                  {goals.map((g,i)=>(
                    <div key={i} style={S.goalItem}>
                      <div style={{flex:1}}>
                        <p style={S.goalName}>{g.text}</p>
                        <div style={S.progressBarWrap}>
                          <div style={{...S.progressBar, width:`${Math.min(100,Math.round((g.current/g.target)*100))}%`}}/>
                        </div>
                        <p style={S.goalMeta}>{g.current} / {g.target} milestones · {Math.round((g.current/g.target)*100)}%</p>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:4}}>
                        <button style={S.addBtn} onClick={()=>setGoals(prev=>prev.map((x,j)=>j===i?{...x,current:Math.min(x.target,x.current+1)}:x))}>+1</button>
                        <button style={S.delBtn} onClick={()=>setGoals(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
                      </div>
                    </div>
                  ))}
                  {showGoalForm&&(
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <input style={S.input} placeholder="Your dream goal (e.g. Buy my BMW 🚗)" value={newGoalText} onChange={e=>setNewGoalText(e.target.value)}/>
                      <div style={S.row}>
                        <span style={{fontSize:11,color:"rgba(180,140,255,0.6)",flexShrink:0}}>Milestones:</span>
                        {[5,10,20,30,50,100].map(n=>(
                          <button key={n} style={{...S.pickerOpt,...(newGoalTarget===n?S.pickerOptOn:{})}} onClick={()=>setNewGoalTarget(n)}>{n}</button>
                        ))}
                      </div>
                      <div style={S.row}>
                        <button style={{...S.genBtn,flex:2,...(!newGoalText.trim()?S.btnOff:{})}}
                          onClick={()=>{
                            if(!newGoalText.trim()) return;
                            setGoals(prev=>[...prev,{text:newGoalText.trim(),target:newGoalTarget,current:0}]);
                            setNewGoalText(""); setShowGoalForm(false);
                          }}
                          disabled={!newGoalText.trim()}>✦ Save Goal</button>
                        <button style={{...S.regenBtn,flex:1}} onClick={()=>setShowGoalForm(false)}>Cancel</button>
                      </div>
                    </div>
                  )}
                  {!showGoalForm&&(
                    <button style={S.regenBtn} onClick={()=>setShowGoalForm(true)}>＋ Add Goal</button>
                  )}
                </div>

                {/* Recent affirmations log */}
                {afLog.length>0&&(
                  <div style={S.alarmBox}>
                    <p style={S.alarmBoxLabel}>RECENT AFFIRMATIONS</p>
                    {afLog.slice(0,5).map((a,i)=>(
                      <div key={i} style={S.afLogItem}>
                        <p style={S.afLogBadge}>{a.intention}</p>
                        <p style={S.afLogText}>{a.text.length>120?a.text.slice(0,120)+"...":a.text}</p>
                        <p style={S.afLogDate}>{a.date}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}

          <p style={S.footer}>Powered by cosmic intelligence ✦ ManiFestinger</p>
        </div>
      </div>

      {/* Vision focus modal */}
      {focusedV&&(
        <div style={S.modal} onClick={()=>setFocusedV(null)}>
          <div style={S.modalBox} onClick={e=>e.stopPropagation()}>
            <img src={focusedV.src} alt={focusedV.label} style={S.modalImg} onError={e=>e.target.src="https://placehold.co/600x400/1a0a3a/9060ff?text=Vision"}/>
            <p style={S.modalLabel}>{focusedV.label}</p>
            <p style={S.modalAffirm}>This is mine. I claim it. I am worthy of this and more. ✦</p>
            <button style={S.modalClose} onClick={()=>setFocusedV(null)}>Close</button>
          </div>
        </div>
      )}

      {/* Alarm fullscreen */}
      {firing&&(
        <div style={S.alarmModal} onClick={()=>{setFiring(null);setFiringAf("");}}>
          {firing.vision
            ?<img src={firing.vision.src} alt={firing.vision.label} style={S.alarmImg} onError={e=>e.target.src="https://placehold.co/800x600/020010/9060ff?text=Vision"}/>
            :<div style={{...S.alarmImg,background:"linear-gradient(135deg,#0a0020,#1a0050)"}}/>
          }
          <div style={S.alarmOverlay}>
            <p style={S.alarmTitle}>{firing.alarm.label||"ManiFestinger"}</p>
            {firing.vision&&<p style={S.alarmVisionLabel}>{firing.vision.label}</p>}
            {firingAf&&<p style={S.alarmAf}>{firingAf}</p>}
            <p style={S.alarmSub}>Stay focused. Stay aligned. ✦</p>
            <p style={S.alarmDismiss}>Tap anywhere to close</p>
          </div>
        </div>
      )}

      {/* Meditation fullscreen */}
      {medActive&&medFullscreen&&grabData&&(
        <div style={S.medFullscreen}>
          <div style={S.medFsInner}>
            <p style={S.medFsTimer}>{fmtTime(medSecondsLeft)}</p>
            <p style={S.medFsIntention}>{grabIntention?.toUpperCase()}</p>
            <p style={{...S.medFsCode,animation:medPulse?"codePulse 2s ease-in-out infinite":undefined}}>{grabData.code}</p>
            {grabAffirm&&<p style={S.medFsAffirm}>{grabAffirm}</p>}
            <div style={S.row}>
              <button style={{...S.genBtn,flex:1,background:"rgba(255,255,255,0.08)",boxShadow:"none",border:"1px solid rgba(255,255,255,0.15)"}}
                onClick={()=>setMedFullscreen(false)}>⊡ Exit Fullscreen</button>
              <button style={{...S.genBtn,flex:1,background:"rgba(200,40,40,0.4)",boxShadow:"none"}} onClick={stopMeditation}>⏹ End</button>
            </div>
          </div>
        </div>
      )}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Raleway:ital,wght@0,300;0,400;0,600;1,300&display=swap');
        @keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
        @keyframes float{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes logoSpin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes codePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.06)}}
        @keyframes codeGlow{0%,100%{text-shadow:0 0 30px rgba(255,200,0,0.6)}50%{text-shadow:0 0 60px rgba(255,200,0,1),0 0 100px rgba(255,160,0,0.6)}}
        *{box-sizing:border-box} textarea{resize:vertical} input[type=time]{color-scheme:dark}
      `}</style>
    </div>
  );
}
